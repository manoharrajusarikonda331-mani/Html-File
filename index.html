<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAGANAR - Login</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 1s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            margin-bottom: 30px;
            padding: 20px;
            text-align: center;
        }

        @keyframes borderGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .brand-symbols {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 25px;
            animation: symbolsFloat 4s ease-in-out infinite;
        }

        @keyframes symbolsFloat {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .symbol {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.08));
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 107, 107, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            color: #ff6b6b;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            box-shadow: 
                0 8px 16px rgba(0, 0, 0, 0.2),
                inset 0 2px 4px rgba(255, 255, 255, 0.1),
                0 0 20px rgba(255, 107, 107, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: symbolElegant 8s ease-in-out infinite;
            transform-style: preserve-3d;
            position: relative;
            overflow: hidden;
        }

        .symbol::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 107, 107, 0.1), transparent);
            animation: shine 3s linear infinite;
            transform: rotate(45deg);
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .symbol:hover {
            transform: scale(1.15) rotateY(15deg) rotateX(10deg);
            box-shadow: 
                0 16px 32px rgba(0, 0, 0, 0.3),
                inset 0 4px 8px rgba(255, 255, 255, 0.2),
                0 0 40px rgba(255, 107, 107, 0.4);
            border-color: rgba(255, 107, 107, 0.8);
        }

        @keyframes symbolElegant {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.1); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        /* Complex rotation sequence: individual then group rotation every 10 seconds */
        .symbol:nth-child(1) {
            animation: complexRotation1 10s ease-in-out infinite;
        }

        .symbol:nth-child(2) {
            animation: complexRotation2 10s ease-in-out infinite;
        }

        .symbol:nth-child(3) {
            animation: complexRotation3 10s ease-in-out infinite;
        }

        @keyframes complexRotation1 {
            0% { transform: rotateY(0deg) scale(1); }
            33.3% { transform: rotateY(360deg) scale(1); }
            33.4% { transform: rotateY(360deg) scale(1); }
            66.6% { transform: rotateY(360deg) scale(1); }
            66.7% { transform: rotateY(720deg) scale(1); }
            100% { transform: rotateY(720deg) scale(1); }
        }

        @keyframes complexRotation2 {
            0% { transform: rotateY(0deg) scale(1); }
            33.3% { transform: rotateY(0deg) scale(1); }
            35% { transform: rotateY(60deg) scale(1); }
            40% { transform: rotateY(120deg) scale(1); }
            45% { transform: rotateY(180deg) scale(1); }
            50% { transform: rotateY(240deg) scale(1); }
            55% { transform: rotateY(300deg) scale(1); }
            60% { transform: rotateY(360deg) scale(1); }
            66.6% { transform: rotateY(360deg) scale(1); }
            100% { transform: rotateY(360deg) scale(1); }
        }

        @keyframes complexRotation3 {
            0% { transform: rotateZ(0deg) scale(1); }
            66.6% { transform: rotateZ(0deg) scale(1); }
            66.7% { transform: rotateZ(360deg) scale(1); }
            100% { transform: rotateZ(720deg) scale(1); }
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo svg {
            width: 340px;
            height: 73px;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px) rotateX(0deg) scale(1); }
            50% { transform: translateY(-8px) rotateX(3deg) scale(1.02); }
        }

        .brand-name {
            font-size: 68px;
            font-weight: 900;
            font-family: 'Trebuchet MS', 'Arial Black', sans-serif;
            color: #0a0a0a;
            margin-bottom: 35px;
            margin-top: 20px;
            letter-spacing: 4px;
            text-shadow: 
                0 4px 8px rgba(0, 0, 0, 0.2),
                0 8px 16px rgba(255, 107, 107, 0.1),
                2px 2px 4px rgba(255, 255, 255, 0.15);
            position: relative;
            display: inline-block;
            text-transform: uppercase;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s infinite;
        }

        @keyframes textShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.1); }
        }

        .brand-name::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 4px;
            background: linear-gradient(90deg, #ff6b6b 0%, #ffa502 50%, #ff6b6b 100%);
            border-radius: 2px;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
            animation: slideIn 1.5s ease-out;
        }

        @keyframes slideIn {
            from { width: 0; opacity: 0; }
            to { width: 85%; opacity: 1; }
        }

        .brand-name::before {
            content: '◆';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #ff6b6b;
            animation: diamondPulse 2s infinite;
        }

        @keyframes diamondPulse {
            0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.6; }
            50% { transform: translateX(-50%) scale(1.3); opacity: 1; }
        }

        form {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 300px;
        }

        input {
            margin: 10px 0;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        button {
            margin-top: 20px;
            padding: 15px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #ff6b6b, #ffa500);
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: buttonGlow 2s infinite alternate;
        }

        @keyframes buttonGlow {
            from { box-shadow: 0 0 20px rgba(255, 107, 107, 0.5); }
            to { box-shadow: 0 0 30px rgba(255, 107, 107, 0.8); }
        }

        /* Replace line 287-290 with this */
button:hover {
    transform: translateY(-3px) scale(1.05);
    background: linear-gradient(135deg, #ffaa33, #ff6b6b); 
    box-shadow: 0 10px 25px rgba(255, 107, 107, 0.6);
    cursor: pointer;
}

input {

.eye-icon {

.eye-icon:hover {
    opacity: 1;
}

.eye-icon svg {
    width: 22px;

    fill: white;
}

        .particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 6s infinite linear;
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); }
            100% { transform: translateY(-100px) rotate(360deg); }
        }

        @keyframes spinNode {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes auraPulse {
            0% { transform: scale(1); filter: blur(20px); opacity: 0.8; }
            100% { transform: scale(1.03); filter: blur(28px); opacity: 1; background: linear-gradient(135deg, rgba(0,242,254,0.2), rgba(255,126,95,0.2)); }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <!-- NEXT-LEVEL ENTERPRISE BRANDING CORE -->
  <div class="login-portal-wrapper" style="position: relative; display: flex; flex-direction: row; width: 100%; max-width: 900px; background: rgba(255, 255, 255, 0.03); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 24px; padding: 45px; box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4); align-items: center; justify-content: space-between; gap: 40px; z-index: 5;">
        
        <div class="portal-ambient-glow" style="position: absolute; inset: -1px; border-radius: 24px; background: linear-gradient(135deg, rgba(255,126,95,0.15), rgba(0,242,254,0.15)); filter: blur(20px); z-index: -1; animation: auraPulse 8s ease-in-out infinite alternate;"></div>
        
        <div class="brand-core-container" style="flex: 1; text-align: center; max-width: 400px; display: flex; flex-direction: column; align-items: center; justify-content: center;">
            <h1 class="brand-title-neon" style="font-family: 'Poppins', sans-serif; font-weight: 800; letter-spacing: 8px; margin: 0 0 25px 0; background: linear-gradient(135deg, #ff7e5f, #feb47b); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 4px 12px rgba(255,126,95,0.4)); text-transform: uppercase; font-size: 2.6rem; text-align: center; width: 100%;">HAGANAR</h1>

            <div class="logo-node-wrapper" style="position: relative; width: 140px; height: 140px; margin: 0 auto 25px auto; display: flex; align-items: center; justify-content: center;">
                <div class="node-pulse" style="position: absolute; inset: -10px; border-radius: 50%; background: linear-gradient(135deg, #ff7e5f, #feb47b); opacity: 0.3; filter: blur(12px);"></div>
                <div class="node-track" style="position: absolute; inset: 0; border: 2.5px dashed rgba(255, 126, 95, 0.6); border-radius: 50%; animation: spinNode 25s linear infinite;"></div>
                <div class="node-shield-core" style="position: relative; width: 116px; height: 116px; background: linear-gradient(145deg, #1e293b, #0f172a); border: 2.5px solid rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 6px 14px rgba(0,0,0,0.6), 0 10px 25px rgba(0,0,0,0.4);">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 52%; height: 52%; filter: drop-shadow(0 4px 12px rgba(255,126,95,0.5));">
                        <path d="M12 2L4 5V11C4 16.55 7.41 21.74 12 23C16.59 21.74 20 16.55 20 11V5L12 2Z" stroke="url(#brandNeonGrad)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="2.8" fill="url(#brandNeonGrad)"/>
                        <path d="M12 7V9.5M12 14.5V17M7 12H9.5M14.5 12H17" stroke="url(#brandNeonGrad)" stroke-width="1.8" stroke-linecap="round"/>
                        <defs>
                            <linearGradient id="brandNeonGrad" x1="4" y1="2" x2="20" y2="23" gradientUnits="userSpaceOnUse">
                                <stop offset="0%" stop-color="#ff7e5f" />

                            </linearGradient>
                        </defs>
                    </svg>
                </div>
            </div>
            <div class="interface-accent-line" style="width: 80px; height: 3.5px; background: linear-gradient(90deg, transparent, #ff7e5f, transparent); margin: 0 auto;"></div>
        </div>

        <form id="loginForm" action="/login" method="POST" style="flex: 1; display: flex !important; flex-direction: column !important; width: 100%; max-width: 380px; gap: 20px; margin: 0;">
            <input type="text" id="usernameField" name="username" placeholder="Username" required style="width: 100%; transition: all 0.3s ease;">
            
            <div class="input-group" style="position: relative; width: 100%;">
                <input type="password" id="password" name="password" placeholder="Password" required style="width: 100%;">
                <span id="togglePassword" class="eye-icon">
                    <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                </span>
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; padding: 14px; background: linear-gradient(135deg, #ff7e5f, #feb47b); border: none; border-radius: 12px; color: #fff; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 15px rgba(255,126,95,0.3); display: flex; align-items: center; justify-content: center; gap: 10px;">
                <span id="btnText">Login</span>
            </button>
</form>
    </div>

    <script>
    /**
     * @fileoverview HAGANAR Core Gateway Authentication & Premium Modal Engine
     * Enterprise Architecture - Production Level
     */
    (() => {
        'use strict';

        // Lifecycle Verification: Session State Management Vector
        window.addEventListener('load', () => {
            if (sessionStorage.getItem('isLoggedIn') === 'true') {
                window.location.href = 'welcome.html';
            }
        });

        // Background Layer: High-Performance Vector Particle Engine
        const createParticles = () => {
            const container = document.getElementById('particles');
            if (!container) return;

            const fragment = document.createDocumentFragment();
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = `${Math.random() * 100}%`;
                
                const dimension = `${Math.random() * 10 + 5}px`;
                particle.style.width = dimension;
                particle.style.height = dimension;
                
                particle.style.animationDelay = `${Math.random() * 6}s`;
                particle.style.animationDuration = `${Math.random() * 4 + 6}s`;
                fragment.appendChild(particle);
            }
            container.appendChild(fragment);
        };

        /**
         * Generates and triggers a separate premium glassmorphic interface modal overlay
         * @param {string} headingTitle - Strict error class designation header
         * @param {string} detailedMessage - Explicit authentication exception message
         */
        const triggerSecurityModal = (headingTitle, detailedMessage) => {
            // Remove any existing modal instances to avoid node pollution
            const existingModal = document.getElementById('securityModalOverlay');
            if (existingModal) existingModal.remove();

            // Create Modal Backdrop Overlay Canvas
            const overlay = document.createElement('div');
            overlay.id = 'securityModalOverlay';
            overlay.style.position = 'fixed';
            overlay.style.top = '0';
            overlay.style.left = '0';
            overlay.style.width = '100vw';
            overlay.style.height = '100vh';
            overlay.style.backgroundColor = 'rgba(10, 15, 30, 0.7)';
            overlay.style.backdropFilter = 'blur(12px)';
            overlay.style.webkitBackdropFilter = 'blur(12px)';
            overlay.style.display = 'flex';
            overlay.style.justifyContent = 'center';
            overlay.style.alignItems = 'center';
            overlay.style.zIndex = '99999';
            overlay.style.animation = 'fadeIn 0.3s ease-out forwards';

            // Create Premium Glassmorphism Dialog Panel Container
            const modalBox = document.createElement('div');
            modalBox.style.width = '90%';
            modalBox.style.maxWidth = '420px';
            modalBox.style.background = 'linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03))';
            modalBox.style.border = '1px solid rgba(239, 68, 68, 0.3)';
            modalBox.style.boxShadow = '0 20px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1)';
            modalBox.style.borderRadius = '16px';
            modalBox.style.padding = '30px';
            modalBox.style.textAlign = 'center';
            modalBox.style.fontFamily = 'system-ui, -apple-system, sans-serif';
            modalBox.style.transform = 'scale(0.9)';
            modalBox.style.animation = 'scaleUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards';

            // Create Animated Guard Header Icon Vector
            const iconContainer = document.createElement('div');
            iconContainer.style.marginBottom = '18px';
            iconContainer.innerHTML = `
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="rgba(239, 68, 68, 0.15)" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 8V12" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M12 16H12.01" stroke="#ef4444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            `;

            // Title Header String Node
            const titleNode = document.createElement('h3');
            titleNode.textContent = headingTitle;
            titleNode.style.color = '#f87171';
            titleNode.style.fontSize = '20px';
            titleNode.style.margin = '0 0 12px 0';
            titleNode.style.fontWeight = '600';
            titleNode.style.letterSpacing = '0.5px';

            // Detailed Exception Narrative Description Node
            const messageNode = document.createElement('p');
            messageNode.textContent = detailedMessage;
            messageNode.style.color = '#cbd5e1';
            messageNode.style.fontSize = '14px';
            messageNode.style.lineHeight = '1.6';
            messageNode.style.margin = '0 0 24px 0';

            // Premium Interactive Action Dismissal Interface Button
            const dismissBtn = document.createElement('button');
            dismissBtn.textContent = 'Acknowledge & Retry';
            dismissBtn.style.width = '100%';
            dismissBtn.style.padding = '12px';
            dismissBtn.style.background = 'linear-gradient(135deg, #ef4444, #b91c1c)';
            dismissBtn.style.border = 'none';
            dismissBtn.style.borderRadius = '8px';
            dismissBtn.style.color = '#ffffff';
            dismissBtn.style.fontSize = '14px';
            dismissBtn.style.fontWeight = '600';
            dismissBtn.style.cursor = 'pointer';
            dismissBtn.style.transition = 'all 0.2s ease';
            dismissBtn.style.boxShadow = '0 4px 15px rgba(239, 68, 68, 0.3)';

            // Interactive Button Hover State Logic Mutations
            dismissBtn.addEventListener('mouseenter', () => dismissBtn.style.opacity = '0.9');
            dismissBtn.addEventListener('mouseleave', () => dismissBtn.style.opacity = '1');

            // Dismiss Action Sequence logic
            const closeModal = () => {
                overlay.style.animation = 'fadeOut 0.2s ease-out forwards';
                setTimeout(() => overlay.remove(), 200);
            };

            dismissBtn.addEventListener('click', closeModal);
            overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

            // Assemble Modal DOM Sub-Tree Nodes
            modalBox.appendChild(iconContainer);
            modalBox.appendChild(titleNode);
            modalBox.appendChild(messageNode);
            modalBox.appendChild(dismissBtn);
            overlay.appendChild(modalBox);
            document.body.appendChild(overlay);
        };

        // Inject Required Animation Rules Directly into Document Tree
        const injectStyles = () => {
            const styleNode = document.createElement('style');
            styleNode.textContent = `
                @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
                @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
                @keyframes scaleUp { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
            `;
            document.head.appendChild(styleNode);
        };

        // Core Identity Processing Gateway Matrix
        const handleGatewaySubmission = (event) => {
            event.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            const usernameInput = document.getElementsByName('username')[0];
            const passwordInput = document.getElementById('password');

            const enteredUsername = usernameInput ? usernameInput.value.trim() : '';
            const enteredPassword = passwordInput ? passwordInput.value : '';

            // Strict Validation Logic Block Configuration
            const isUsernameCorrect = (enteredUsername === 'haganar');
            const isPasswordCorrect = (enteredPassword === 'admin');

            if (isUsernameCorrect && isPasswordCorrect) {
                // Set authenticated persistence states inside memory tracking buffers
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('haganar_user', enteredUsername);

                // Initialize success interface transitions
                if (submitBtn && btnText) {
                    submitBtn.style.background = 'linear-gradient(135deg, #00b09b, #96c93d)';
                    submitBtn.style.boxShadow = '0 6px 20px rgba(0, 176, 155, 0.5)';
                    submitBtn.style.transform = 'scale(0.98)';
                    btnText.innerHTML = '✔ Success! Access Granted';
                }

                // Smoothly route client vector into the application layer workspace
                setTimeout(() => {
                    window.location.href = 'welcome.html';
                }, 1200);

            } else {
                // Determine the precise parameters configuration error mismatch type
                if (!isUsernameCorrect && !isPasswordCorrect) {
                    triggerSecurityModal('ACCESS DENIED', 'Both Username & Password fields are invalid. Please check your credentials and try again.');
                } else if (!isUsernameCorrect) {
                    triggerSecurityModal('INVALID USERNAME', 'The security framework does not recognize that Username. Verification failed.');
                } else {
                    triggerSecurityModal('INVALID PASSWORD', 'The password input sequence is incorrect. Gateway entry rejected.');
                }
                
                // Reset password input container structure field gracefully
                if (passwordInput) passwordInput.value = '';
            }
        };

        // Password Mask/Visibility Toggling Core
        const initializePasswordToggle = () => {
            const togglePassword = document.querySelector('#togglePassword');
            const passwordField = document.querySelector('#password');
            const eyeIcon = document.querySelector('#eyeIcon');

            if (!togglePassword || !passwordField || !eyeIcon) return;

            const eyeOpen = "M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z";
            const eyeClosed = "M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.44-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z";

            togglePassword.addEventListener('click', () => {
                const currentType = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordField.setAttribute('type', currentType);
                
                const targetPath = eyeIcon.querySelector('path');
                if (targetPath) {
                    targetPath.setAttribute('d', currentType === 'password' ? eyeOpen : eyeClosed);
                }
            });
        };

        // Asynchronous Network Context Processor Pipeline
        window.askHaganarAI = async (userPrompt) => {
            const isStaticHost = window.location.hostname.includes('github.io');
            const ENDPOINT_URL = isStaticHost ? 'https://haganar-backend.onrender.com' : '';

            try {
                const response = await fetch(`${ENDPOINT_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: userPrompt })
                });
                
                const data = await response.json();
                if (data.reply) {
                    console.log("HAGANAR Gateway Response:", data.reply);
                }
            } catch (networkFault) {
                console.error("Communication broke down with AI engine path:", networkFault);
            }
        };

        // Initialize Core Component Execution Vectors
        document.addEventListener('DOMContentLoaded', () => {
            injectStyles();
            createParticles();
            initializePasswordToggle();

            const formElement = document.getElementById('loginForm');
            if (formElement) {
                formElement.addEventListener('submit', handleGatewaySubmission);
            }
        });
    })();
</script>
</body>
</html>
