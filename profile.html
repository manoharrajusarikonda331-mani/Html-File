<!DOCTYPE HTML>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAGANAR - Secure Profile Dashboard</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>

    /* --- HAGANAR AI Chat Widget Styles --- */
#haganar-chat-container {
    position: fixed;
    bottom: 25px;
    right: 25px;
    z-index: 1000;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
}

#chat-toggle-btn {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #ffffff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
    transition: all 0.3s ease;
}

#chat-toggle-btn:hover {
    transform: scale(1.05);
    background: rgba(255, 255, 255, 0.15);
}

#chat-window {
    position: absolute;
    bottom: 75px;
    right: 0;
    width: 350px;
    height: 450px;
    background: rgba(15, 15, 25, 0.75);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 16px;
    box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

#chat-window.hidden {
    opacity: 0;
    transform: translateY(20px) scale(0.95);
    pointer-events: none;
}

.chat-header {
    padding: 16px;
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.agent-info {
    display: flex;
    align-items: center;
    gap: 10px;
}

.agent-dot {
    width: 8px;
    height: 8px;
    background: #00ffa3;
    border-radius: 50%;
    box-shadow: 0 0 8px #00ffa3;
}

.chat-header h3 {
    margin: 0;
    color: #ffffff;
    font-size: 15px;
    font-weight: 500;
}

.close-btn {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.5);
    font-size: 22px;
    cursor: pointer;
}

.chat-messages {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.message {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.4;
}

.ai-message {
    background: rgba(255, 255, 255, 0.05);
    color: #e0e0e0;
    align-self: flex-start;
    border-top-left-radius: 4px;
}

.user-message {
    background: rgba(255, 255, 255, 0.15);
    color: #ffffff;
    align-self: flex-end;
    border-top-right-radius: 4px;
}

.chat-input-area {
    padding: 12px;
    background: rgba(0, 0, 0, 0.2);
    display: flex;
    gap: 8px;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
}

#user-input {
    flex: 1;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 10px;
    color: #ffffff;
    outline: none;
}

#user-input::placeholder {
    color: rgba(255, 255, 255, 0.3);
}

#send-btn {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    color: #ffffff;
    padding: 0 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
}

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient glowing background shapes to match the login screen */
        .bg-glows {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .glow-sphere {
            position: absolute;
            background: radial-gradient(circle, rgba(255, 107, 107, 0.4) 0%, rgba(127, 0, 255, 0.1) 70%);
            border-radius: 50%;
            filter: blur(40px);
        }
        .sphere-1 { width: 300px; height: 300px; top: -5%; left: -5%; }
        .sphere-2 { width: 400px; height: 400px; bottom: -10%; right: -5%; }

        /* Professional Glassmorphism Profile Card Container */
        .profile-container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: #fff;
            animation: cardFadeIn 0.8s ease-out;
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Modern Avatar Design */
        .avatar-box {
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        h2 { 
            font-weight: 600;
            font-size: 26px;
            letter-spacing: 0.5px;
            margin-bottom: 6px; 
        }

        p.role { 
            color: #b8b5ff; 
            font-size: 14px; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 30px; 
        }

        /* Enterprise-Style Metrics Dashboard Panel */
        .info-panel {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            padding: 20px;
            text-align: left;
            margin-bottom: 30px;
        }

        .info-item { 
            margin-bottom: 12px; 
            font-size: 14px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
        }
        
        .info-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }

        .info-item strong { 
            color: rgba(255, 255, 255, 0.6); 
            font-weight: 500;
        }

        .info-item span { 
            color: #ffffff; 
            font-weight: 600;
        }

        /* Secure Action Button */
        .logout-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        /* 1. Base Body styling with a modern dark gradient background */
body {
    background: #0f172a; /* Deep slate dark mode */
    color: #f8fafc;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
    min-height: 100vh;

}

/* 2. Vibrant background glow spheres that float behind the glass */

    position: absolute;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    z-index: -1;
    top: 0;

}
.glow-sphere {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);

}
.sphere-1 {
    width: 300px;

    background: #3b82f6; /* Vibrant Blue */

}

    width: 400px;
    height: 400px;
    background: #a855f7; /* Vibrant Purple */

}

/* 3. The Core Glassmorphism Container */
.profile-container {
    background: rgba(255, 255, 255, 0.07); /* Ultra-transparent white */
    backdrop-filter: blur(16px); /* Frosted glass effect */
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.15); /* Clean glassy border */

    padding: 40px;
    width: 90%;

    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);

}

/* 4. Avatar and Typography */
.avatar-box {
    font-size: 3rem;
    margin-bottom: 15px;
}
h2 {
    margin: 10px 0 5px 0;
    font-size: 1.8rem;
    font-weight: 600;
    letter-spacing: -0.5px;
}
.role {
    color: #94a3b8; /* Subtle text color */
    margin-bottom: 30px;
    font-size: 1rem;
}

/* 5. Info Panel Layout inside the glass */
.info-panel {
    background: rgba(0, 0, 0, 0.2); /* Slightly darker backing for contrast */
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 25px;
    text-align: left;
}
.info-item {
    display: flex;
    justify-content: space-between;
    padding: 12px 0;
    font-size: 0.95rem;

}
.info-item:last-child {
    border-bottom: none;
}
.info-item strong {

}
.info-item span {
    color: #38bdf8; /* Highlighted variable values */
    font-family: 'Courier New', Courier, monospace; /* Clean node/dev text style */
}

/* 6. Premium Interactive Glass Button */
.logout-btn {
    width: 100%;
    background: rgba(239, 68, 68, 0.2); /* Transparent red tint */

    border: 1px solid rgba(239, 68, 68, 0.4);
    padding: 14px;
    border-radius: 12px;

</head>
<body>

    <div class="bg-glows">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
    </div>

    <div class="profile-container">
        <div class="avatar-box">👨‍💻</div>
        <h2>Sarikonda Manohar Raju</h2>
        <p class="role">Lead Platform Engineer & Founder</p>
        
        <div class="info-panel">
            <div class="info-item"><strong>Account Status:</strong> <span>Verified Security</span></div>
            <div class="info-item"><strong>Clearance Level:</strong> <span>Administrator</span></div>
            <div class="info-item"><strong>Active Deployment:</strong> <span>HAGANAR Main Node</span></div>
            <div class="info-item"><strong>Environment Node:</strong> <span>Localhost:5500</span></div>
        </div>

        <button class="logout-btn" onclick="window.location.href='welcome.html'">Secure Log Out</button>
    </div>

    <!-- HAGANAR Floating AI Chat Widget -->
<div id="haganar-chat-container">
    <!-- Chat Toggle Button -->
    <button id="chat-toggle-btn" onclick="toggleChat()">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 8-9.04 9.06a2.1 2.1 0 1 0 2.98 2.98L15 11.04z"/><path d="M19 3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-4l-4 4v-4H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h14z"/></svg>
    </button>

    <!-- Chat Box Window -->
    <div id="chat-window" class="hidden">
        <div class="chat-header">
            <div class="agent-info">
                <div class="agent-dot"></div>
                <h3>HAGANAR AI Agent</h3>
            </div>
            <button class="close-btn" onclick="toggleChat()">&times;</button>
        </div>
        <div id="chat-messages" class="chat-messages">
            <div class="message ai-message">Hello Mani! How can I assist you with the HAGANAR ecosystem today?</div>
        </div>
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button id="send-btn" onclick="sendMessage()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const chatWindow = document.getElementById('chat-window');
    chatWindow.classList.toggle('hidden');
}

function handleKeyPress(event) {
    if (event.key === 'Enter') {
        sendMessage();
    }
}

function sendMessage() {
    const inputElement = document.getElementById('user-input');
    const messageText = inputElement.value.trim();
    
    if (messageText === '') return;

    // 1. Add User Message to Screen
    const messagesContainer = document.getElementById('chat-messages');
    const userMessageDiv = document.createElement('div');
    userMessageDiv.className = 'message user-message';
    userMessageDiv.textContent = messageText;
    messagesContainer.appendChild(userMessageDiv);

    // Clear input box
    inputElement.value = '';
    messagesContainer.scrollTop = messagesContainer.scrollHeight;

    // 2. Simulate AI Response for now
    setTimeout(() => {
        const aiMessageDiv = document.createElement('div');
        aiMessageDiv.className = 'message ai-message';
        aiMessageDiv.textContent = "Processing... Soon we will connect this input dynamically to your live back-end API agent handler!";
        messagesContainer.appendChild(aiMessageDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }, 800);
}
</script>
</body>
